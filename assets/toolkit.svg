<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0.5" y="0.5" width="999" height="399" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="36" y="42" font-size="11.5" letter-spacing="2.5" fill="#94a3b8" font-family="'SF Mono', ui-monospace, monospace">THE TOOLKIT</text>
  <text x="36" y="72" font-size="21" font-weight="700" letter-spacing="-0.4" fill="#1e293b">~25 agents and a ~1,500-skill library</text>
  <text x="36" y="96" font-size="14" fill="#475569">A selector binds the right ~8&#8211;12 skills plus the fitting agents per build. Nothing loads until it is used.</text>

  <text x="36" y="128" font-size="11" letter-spacing="1.5" fill="#94a3b8" font-family="'SF Mono', ui-monospace, monospace">AGENTS &#183; 25 NATIVE, LEAST-PRIVILEGE</text>

  <rect x="32" y="140" width="456" height="72" rx="12" fill="#ffffff" stroke="#eef1f5"/>
  <rect x="32" y="140" width="6" height="72" rx="3" fill="#0d9488"/>
  <text x="52" y="168" font-size="14" font-weight="700" fill="#1e293b">Build specialists <tspan fill="#0d9488">&#183; 10</tspan></text>
  <text x="52" y="190" font-size="12" fill="#64748b">backend &#183; frontend &#183; data &#183; AI-engineering &#183; evals</text>
  <text x="52" y="206" font-size="12" fill="#64748b">security &#183; planning &#183; research &#183; writing &#183; implementer</text>

  <rect x="32" y="222" width="456" height="72" rx="12" fill="#ffffff" stroke="#eef1f5"/>
  <rect x="32" y="222" width="6" height="72" rx="3" fill="#f2603c"/>
  <text x="52" y="250" font-size="14" font-weight="700" fill="#1e293b">Research &amp; oversight <tspan fill="#f2603c">&#183; 8</tspan></text>
  <text x="52" y="272" font-size="12" fill="#64748b">selector &#183; quarantined scouts &#183; guidelines monitor &#183; frontier-advisor</text>
  <text x="52" y="288" font-size="12" fill="#64748b">opportunity &#183; blindspot &#183; utilization &#183; loop-auditor</text>

  <rect x="32" y="304" width="456" height="72" rx="12" fill="#ffffff" stroke="#eef1f5"/>
  <rect x="32" y="304" width="6" height="72" rx="3" fill="#6366f1"/>
  <text x="52" y="332" font-size="14" font-weight="700" fill="#1e293b">Judges &amp; council <tspan fill="#475569">&#183; 7</tspan></text>
  <text x="52" y="354" font-size="12" fill="#64748b">acceptance-gate &#183; system auditor</text>
  <text x="52" y="370" font-size="12" fill="#64748b">+ the five-agent idea council</text>

  <text x="512" y="128" font-size="11" letter-spacing="1.5" fill="#94a3b8" font-family="'SF Mono', ui-monospace, monospace">SKILLS &#183; ~1,500, LOADED ON USE</text>
  <rect x="512" y="140" width="456" height="236" rx="12" fill="#ffffff" stroke="#eef1f5"/>
  <g font-size="11.5" font-weight="600" fill="#ffffff" text-anchor="middle">
    <rect x="530" y="158" width="128" height="30" rx="8" fill="#0d9488"/><text x="594" y="178">frontend</text>
    <rect x="668" y="158" width="128" height="30" rx="8" fill="#f2603c"/><text x="732" y="178">backend</text>
    <rect x="806" y="158" width="144" height="30" rx="8" fill="#6366f1"/><text x="878" y="178">data / pipelines</text>
    <rect x="530" y="196" width="128" height="30" rx="8" fill="#f2603c"/><text x="594" y="216">evals</text>
    <rect x="668" y="196" width="128" height="30" rx="8" fill="#6366f1"/><text x="732" y="216">security</text>
    <rect x="806" y="196" width="144" height="30" rx="8" fill="#0d9488"/><text x="878" y="216">RAG / retrieval</text>
    <rect x="530" y="234" width="128" height="30" rx="8" fill="#6366f1"/><text x="594" y="254">agents / MCP</text>
    <rect x="668" y="234" width="128" height="30" rx="8" fill="#0d9488"/><text x="732" y="254">prompt-eng</text>
    <rect x="806" y="234" width="144" height="30" rx="8" fill="#f2603c"/><text x="878" y="254">design / UI</text>
    <rect x="530" y="272" width="128" height="30" rx="8" fill="#0d9488"/><text x="594" y="292">research</text>
    <rect x="668" y="272" width="128" height="30" rx="8" fill="#f2603c"/><text x="732" y="292">deploy / infra</text>
    <rect x="806" y="272" width="144" height="30" rx="8" fill="#6366f1"/><text x="878" y="292">testing</text>
  </g>
  <text x="530" y="330" font-size="12" fill="#475569">The selector returns <tspan font-weight="600" fill="#1e293b">paths, not contents</tspan> &#8212; a skill's text</text>
  <text x="530" y="348" font-size="12" fill="#475569">loads only when it's actually used, so the model pays no</text>
  <text x="530" y="366" font-size="12" fill="#475569">token rent on the ~1,500 it never touches.</text>
</svg>
