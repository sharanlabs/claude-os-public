<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 742" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0.5" y="0.5" width="999" height="741" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="36" y="42" font-size="11.5" letter-spacing="2.5" fill="#94a3b8" font-family="'SF Mono', ui-monospace, monospace">A BUILD, TRACED</text>
  <text x="36" y="72" font-size="22" font-weight="700" letter-spacing="-0.4" fill="#1e293b">Building an issue-triage agent</text>
  <text x="36" y="96" font-size="14" fill="#475569">One prompt to a shipped agent &#8212; every capability, in order.</text>

  <line x1="92" y1="151" x2="92" y2="669" stroke="#e2e8f0" stroke-width="2"/>

  <circle cx="92" cy="151" r="15" fill="#0d9488"/><text x="92" y="156" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <rect x="124" y="120" width="840" height="62" rx="12" fill="#ffffff" stroke="#eef1f5"/>
  <rect x="140" y="139" width="86" height="24" rx="12" fill="#0d9488"/><text x="183" y="155" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">prompt</text>
  <text x="248" y="147" font-size="13.5" fill="#1e293b" font-family="'SF Mono', ui-monospace, monospace">/claude-os "triage incoming GitHub issues"</text>
  <text x="248" y="167" font-size="11.5" fill="#64748b">label them, flag likely duplicates, draft a first reply</text>

  <circle cx="92" cy="225" r="15" fill="#f2603c"/><text x="92" y="230" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <rect x="124" y="194" width="840" height="62" rx="12" fill="#ffffff" stroke="#eef1f5"/>
  <rect x="140" y="213" width="86" height="24" rx="12" fill="#f2603c"/><text x="183" y="229" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">council</text>
  <text x="248" y="221" font-size="13.5" font-weight="600" fill="#1e293b">Five agents debate in sequence</text>
  <text x="248" y="241" font-size="11.5" fill="#64748b">devil's-advocate flags the trap: learn the maintainer's labels, don't impose your own.</text>

  <circle cx="92" cy="299" r="15" fill="#6366f1"/><text x="92" y="304" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <rect x="124" y="268" width="840" height="62" rx="12" fill="#ffffff" stroke="#eef1f5"/>
  <rect x="140" y="287" width="86" height="24" rx="12" fill="#6366f1"/><text x="183" y="303" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">research</text>
  <text x="248" y="295" font-size="13.5" font-weight="600" fill="#1e293b">Quarantined fan-out gathers prior art</text>
  <text x="248" y="315" font-size="11.5" fill="#64748b">reads the GitHub API + existing bots as untrusted data &#8212; cited, cross-checked, cannot act.</text>

  <circle cx="92" cy="373" r="15" fill="#0d9488"/><text x="92" y="378" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <rect x="124" y="342" width="840" height="62" rx="12" fill="#ffffff" stroke="#eef1f5"/>
  <rect x="140" y="361" width="86" height="24" rx="12" fill="#0d9488"/><text x="183" y="377" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">plan</text>
  <text x="248" y="369" font-size="13.5" font-weight="600" fill="#1e293b">Success criteria, not steps</text>
  <text x="248" y="389" font-size="11.5" fill="#64748b">"labels match on 20 saved issues" &#8212; starts red, turns green only with proof.</text>

  <circle cx="92" cy="447" r="15" fill="#f2603c"/><text x="92" y="452" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">5</text>
  <rect x="124" y="416" width="840" height="62" rx="12" fill="#ffffff" stroke="#eef1f5"/>
  <rect x="140" y="435" width="86" height="24" rx="12" fill="#f2603c"/><text x="183" y="451" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">specialists</text>
  <text x="248" y="443" font-size="13.5" font-weight="600" fill="#1e293b">The right subagents build it</text>
  <text x="248" y="463" font-size="11.5" fill="#64748b">AI-engineering writes the agent; evals builds the golden set + the judge. Each least-privilege.</text>

  <circle cx="92" cy="521" r="15" fill="#6366f1"/><text x="92" y="526" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">6</text>
  <rect x="124" y="490" width="840" height="62" rx="12" fill="#ffffff" stroke="#eef1f5"/>
  <rect x="140" y="509" width="86" height="24" rx="12" fill="#6366f1"/><text x="183" y="525" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">loop</text>
  <text x="248" y="517" font-size="13.5" font-weight="600" fill="#1e293b">write &#8594; test &#8594; fix the cause &#8594; repeat</text>
  <text x="248" y="537" font-size="11.5" fill="#64748b">capped at 5; stops on passing output this run, never by weakening the test.</text>

  <circle cx="92" cy="595" r="15" fill="#0d9488"/><text x="92" y="600" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">7</text>
  <rect x="124" y="564" width="840" height="62" rx="12" fill="#ffffff" stroke="#eef1f5"/>
  <rect x="140" y="583" width="86" height="24" rx="12" fill="#0d9488"/><text x="183" y="599" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">gate</text>
  <text x="248" y="591" font-size="13.5" font-weight="600" fill="#1e293b">The maker never judges its own work</text>
  <text x="248" y="611" font-size="11.5" fill="#64748b">grill &#8594; a rival vendor's model fails to refute it &#8594; verify &#8594; staff-bar &#8594; anti-slop &#8594; SHIP.</text>

  <circle cx="92" cy="669" r="15" fill="#6366f1"/><text x="92" y="674" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">8</text>
  <rect x="124" y="638" width="840" height="62" rx="12" fill="#ffffff" stroke="#eef1f5"/>
  <rect x="140" y="657" width="94" height="24" rx="12" fill="#6366f1"/><text x="187" y="673" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">self-improve</text>
  <text x="256" y="665" font-size="13.5" font-weight="600" fill="#1e293b">Ship (human-approved), then it learns</text>
  <text x="256" y="685" font-size="11.5" fill="#64748b">your correction becomes one lesson, read next run; a new skill is eval'd + written to the registry.</text>

  <text x="36" y="726" font-size="11.5" fill="#94a3b8">Illustrative, not a case study &#8212; but every mechanism above is real and lives in this repo.</text>
</svg>
