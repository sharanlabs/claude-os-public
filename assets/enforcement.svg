<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 572" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0.5" y="0.5" width="759" height="571" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="36" y="42" font-size="11.5" letter-spacing="2.5" fill="#94a3b8" font-family="'SF Mono', ui-monospace, monospace">THE ENFORCEMENT STACK</text>
  <text x="36" y="72" font-size="21" font-weight="700" letter-spacing="-0.4" fill="#1e293b">Five layers, each a check on the one before it</text>

  <g>
    <rect x="80" y="100" width="600" height="68" rx="12" fill="#ffffff" stroke="#eef1f5"/>
    <rect x="100" y="118" width="32" height="32" rx="8" fill="#0d9488"/><text x="116" y="139" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="150" y="130" font-size="15.5" font-weight="700" fill="#1e293b">Constitution</text>
    <text x="150" y="151" font-size="12.5" fill="#475569">12 laws, written down &#183; docs/CONSTITUTION.md</text>
  </g>
  <path d="M373 174 L380 182 L387 174" fill="none" stroke="#cbd5e1" stroke-width="2"/>

  <g>
    <rect x="80" y="188" width="600" height="68" rx="12" fill="#ffffff" stroke="#eef1f5"/>
    <rect x="100" y="206" width="32" height="32" rx="8" fill="#f2603c"/><text x="116" y="227" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="150" y="218" font-size="15.5" font-weight="700" fill="#1e293b">Pipeline</text>
    <text x="150" y="239" font-size="12.5" fill="#475569">brainstorm &#8594; research &#8594; plan &#8594; build &#8594; ship &#183; a hard gate at every stage exit</text>
  </g>
  <path d="M373 262 L380 270 L387 262" fill="none" stroke="#cbd5e1" stroke-width="2"/>

  <g>
    <rect x="80" y="276" width="600" height="68" rx="12" fill="#ffffff" stroke="#eef1f5"/>
    <rect x="100" y="294" width="32" height="32" rx="8" fill="#6366f1"/><text x="116" y="315" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="150" y="306" font-size="15.5" font-weight="700" fill="#1e293b">Gates</text>
    <text x="150" y="327" font-size="12.5" fill="#475569">five checks &#183; the maker never judges its own work &#183; a rival vendor's model must fail to break it</text>
  </g>
  <path d="M373 350 L380 358 L387 350" fill="none" stroke="#cbd5e1" stroke-width="2"/>

  <g>
    <rect x="80" y="364" width="600" height="68" rx="12" fill="#ffffff" stroke="#eef1f5"/>
    <rect x="100" y="382" width="32" height="32" rx="8" fill="#0d9488"/><text x="116" y="403" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <text x="150" y="394" font-size="15.5" font-weight="700" fill="#1e293b">Audit</text>
    <text x="150" y="415" font-size="12.5" fill="#475569">deterministic, read-only &#183; fails the build on any HIGH finding &#183; nothing to talk past</text>
  </g>
  <path d="M373 438 L380 446 L387 438" fill="none" stroke="#cbd5e1" stroke-width="2"/>

  <g>
    <rect x="80" y="452" width="600" height="68" rx="12" fill="#ffffff" stroke="#eef1f5"/>
    <rect x="100" y="470" width="32" height="32" rx="8" fill="#f2603c"/><text x="116" y="491" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">5</text>
    <text x="150" y="482" font-size="15.5" font-weight="700" fill="#1e293b">Hooks</text>
    <text x="150" y="503" font-size="12.5" fill="#475569">run before the agent acts &#183; deny credential reads, fence egress, snapshot before destructive ops</text>
  </g>

  <text x="36" y="548" font-size="11.5" fill="#94a3b8">A rule is written, enforced in the pipeline, judged at the gate, verified by the audit, and bounded by the hooks.</text>
</svg>
