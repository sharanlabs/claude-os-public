<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0.5" y="0.5" width="999" height="299" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>

  <text x="48" y="72" font-size="12" letter-spacing="2.5" fill="#94a3b8" font-family="'SF Mono', ui-monospace, monospace">OPERATING LAYER &#183; CLAUDE CODE</text>
  <text x="46" y="152" font-size="66" font-weight="700" letter-spacing="-1.5" fill="#1e293b">claude-os</text>
  <g>
    <rect x="50" y="170" width="38" height="4" rx="2" fill="#0d9488"/>
    <rect x="92" y="170" width="38" height="4" rx="2" fill="#f2603c"/>
    <rect x="134" y="170" width="38" height="4" rx="2" fill="#6366f1"/>
  </g>
  <text x="48" y="208" font-size="19" fill="#475569">Idea to shipped app, under a constitution</text>
  <text x="48" y="232" font-size="19" fill="#475569">the machine enforces on itself.</text>
  <text x="48" y="268" font-size="12" fill="#94a3b8">MIT &#183; public control-layer edition &#183; read the code, not a black box</text>

  <line x1="654" y1="52" x2="654" y2="248" stroke="#e2e8f0"/>

  <text x="686" y="72" font-size="11" letter-spacing="2" fill="#94a3b8" font-family="'SF Mono', ui-monospace, monospace">WHAT MAKES IT</text>
  <g font-size="13" fill="#1e293b">
    <rect x="686" y="94" width="8" height="8" rx="2" fill="#0d9488"/><text x="706" y="101">constitution, enforced by code</text>
    <rect x="686" y="124" width="8" height="8" rx="2" fill="#f2603c"/><text x="706" y="131">the maker never judges itself</text>
    <rect x="686" y="154" width="8" height="8" rx="2" fill="#6366f1"/><text x="706" y="161">a rival model must fail to break it</text>
    <rect x="686" y="184" width="8" height="8" rx="2" fill="#0d9488"/><text x="706" y="191">audit fails the build on HIGH</text>
    <rect x="686" y="214" width="8" height="8" rx="2" fill="#f2603c"/><text x="706" y="221">runs native, no API keys</text>
  </g>
</svg>
